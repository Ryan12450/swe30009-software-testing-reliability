# GitHub Actions Workflow for Selenium Testing on Ubuntu
# This workflow automates the execution of Selenium tests in a CI/CD pipeline

name: Selenium Tests (Ubuntu)

# Configure the workflow to run manually
on:
  workflow_dispatch:

# Set a global timeout of 30 minutes
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment with built-in caching
      - name: Set up Python with cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Get latest stable Chrome version
      - name: Get latest Chrome version
        id: chrome-version
        run: |
          LATEST_VERSION=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json | jq -r '.channels.Stable.version')
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Latest stable Chrome version: $LATEST_VERSION"

      # Step 5: Cache Chrome and ChromeDriver binaries
      - name: Cache Chrome and ChromeDriver
        uses: actions/cache@v4
        id: chrome-cache
        with:
          path: |
            /opt/chrome
            /usr/local/bin/chromedriver
          key: chrome-${{ steps.chrome-version.outputs.version }}

      # Step 6: Install Chrome and ChromeDriver
      # Only runs if the cache was not found
      - name: Install Chrome for Testing
        if: steps.chrome-cache. outputs.cache-hit != 'true'
        run: |
          CHROME_VERSION="${{ steps.chrome-version.outputs.version }}"
          echo "⬇️ Downloading Chrome for Testing $CHROME_VERSION..."
          
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chrome-linux64.zip"
          unzip -q chrome-linux64. zip
          sudo mkdir -p /opt/chrome
          sudo mv chrome-linux64/* /opt/chrome/
          sudo ln -sf /opt/chrome/chrome /usr/bin/google-chrome
          
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          unzip -q chromedriver-linux64. zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          
          rm chrome-linux64. zip chromedriver-linux64. zip
          echo "✅ Chrome $CHROME_VERSION installed successfully"

      # Step 7: Verify Chrome installation
      - name: Verify browser setup
        run: |
          echo "🔍 Verifying installation..."
          google-chrome --version
          chromedriver --version

      # Step 8: Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      # Step 9: Start the web application
      - name: Start web server
        run: |
          cd "web application"
          php -S localhost:8000 > /dev/null 2>&1 &
          sleep 5
          curl -I http://localhost:8000/index.php || echo "Waiting for server..."
          sleep 2
        env:
          BASE_URL: http://localhost:8000/index.php

      # Step 10: Execute Selenium test script
      - name: Run Selenium tests
        run: |
          cd tests
          python test_order_GitHub_Actions.py
        env:
          BASE_URL: http://localhost:8000/index.php

      # Step 11: Upload artifacts
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-ubuntu
          path: tests/test_report.html
          retention-days: 30
          if-no-files-found: warn
          
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-ubuntu
          path: tests/test_screenshots/
          retention-days: 30
          if-no-files-found: ignore
