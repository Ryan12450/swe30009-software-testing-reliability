# GitHub Actions Workflow for Selenium Testing on Windows
# This workflow automates the execution of Selenium tests in a CI/CD pipeline

name: Selenium Tests (Windows)

# Configure the workflow to run manually
on:
  workflow_dispatch:

# Set a global timeout of 30 minutes
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment with built-in caching
      - name: Set up Python with cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Get latest stable Chrome version
      - name: Get latest Chrome version
        id: chrome-version
        shell: powershell
        run: |
          $response = Invoke-RestMethod -Uri "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
          $version = $response.channels.Stable.version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Latest stable Chrome version: $version"

      # Step 5: Cache Chrome and ChromeDriver binaries
      - name: Cache Chrome and ChromeDriver
        uses: actions/cache@v4
        id: chrome-cache
        with:
          path: |
            C:\chrome
            C:\chromedriver
          key: chrome-${{ steps.chrome-version.outputs.version }}-windows

      # Step 6: Install Chrome and ChromeDriver
      # Only runs if the cache was not found
      - name: Install Chrome for Testing
        if: steps.chrome-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $CHROME_VERSION = "${{ steps.chrome-version.outputs.version }}"
          Write-Host "Downloading Chrome for Testing $CHROME_VERSION (this may take 3-5 minutes)..."
          
          # Disable progress bar for faster downloads
          $ProgressPreference = 'SilentlyContinue'
          
          # Download Chrome
          Write-Host "[1/4] Downloading Chrome browser..."
          Invoke-WebRequest -Uri "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64/chrome-win64.zip" -OutFile "chrome-win64.zip"
          Write-Host "[2/4] Extracting Chrome..."
          Expand-Archive -Path "chrome-win64.zip" -DestinationPath "C:\" -Force
          Rename-Item -Path "C:\chrome-win64" -NewName "chrome" -Force
          
          # Download ChromeDriver
          Write-Host "[3/4] Downloading ChromeDriver..."
          Invoke-WebRequest -Uri "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64/chromedriver-win64.zip" -OutFile "chromedriver-win64.zip"
          Write-Host "[4/4] Extracting ChromeDriver..."
          Expand-Archive -Path "chromedriver-win64.zip" -DestinationPath "C:\" -Force
          Rename-Item -Path "C:\chromedriver-win64" -NewName "chromedriver" -Force
          
          # Add to PATH
          echo "C:\chrome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\chromedriver" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          # Cleanup
          Remove-Item "chrome-win64.zip" -Force
          Remove-Item "chromedriver-win64.zip" -Force
          Write-Host "Chrome $CHROME_VERSION installed successfully!"

      # Step 7: Verify Chrome installation
      - name: Verify browser setup
        shell: powershell
        run: |
          Write-Host "Verifying installation..."
          & "C:\chrome\chrome.exe" --version
          & "C:\chromedriver\chromedriver.exe" --version

      # Step 8: Cache PHP
      - name: Cache PHP
        uses: actions/cache@v4
        with:
          path: C:\tools\php
          key: php-8.1-${{ runner. os }}

      # Step 9: Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: none
          ini-values: error_reporting=E_ALL
          coverage: none

      # Step 10: Start the web application
      - name: Start web server
        shell: powershell
        run: |
          cd "web application"
          Start-Process php -ArgumentList "-S", "localhost:8000" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          curl.exe -I http://localhost:8000/index. php
          Start-Sleep -Seconds 2
        env:
          BASE_URL: http://localhost:8000/index.php

      # Step 11: Execute Selenium test script
      - name: Run Selenium tests
        run: |
          cd tests
          python test_order_GitHub_Actions. py
        env:
          BASE_URL: http://localhost:8000/index. php
          PYTHONIOENCODING: utf-8

      # Step 12: Upload Artifacts
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-windows
          path: tests/test_report. html
          retention-days: 30
          if-no-files-found: warn
          
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-windows
          path: tests/test_screenshots/
          retention-days: 30
          if-no-files-found: ignore
