# GitHub Actions Workflow for Selenium Testing on Windows
# This workflow automates the execution of Selenium tests in a CI/CD pipeline

name: Selenium Tests (Windows)

# Configure the workflow to run manually
on:
  workflow_dispatch:

# Set a global timeout of 30 minutes
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment with built-in caching
      # Updated to v6 to match optimized caching standards
      - name: Set up Python with cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Cache Chrome and ChromeDriver binaries
      # Caches the specific binary directory to prevent re-downloading
      - name: Cache Chrome and ChromeDriver
        uses: actions/cache@v4
        id: chrome-cache
        with:
          path: C:\selenium_bin
          key: chrome-130.0.6723.58-windows

      # Step 5: Install Chrome and ChromeDriver
      # Only runs if the cache (Step 4) was not found
      - name: Install Chrome for Testing
        if: steps.chrome-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $CHROME_VERSION = "130.0.6723.58"
          $CHROME_URL = "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64/chrome-win64.zip"
          $DRIVER_URL = "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64/chromedriver-win64.zip"
          $DEST_DIR = "C:\selenium_bin"

          # Create directory
          New-Item -ItemType Directory -Force -Path $DEST_DIR

          echo "Downloading Chrome for Testing $CHROME_VERSION..."
          
          # Download and Unzip Chrome
          Invoke-WebRequest -Uri $CHROME_URL -OutFile "$DEST_DIR\chrome.zip"
          Expand-Archive -Path "$DEST_DIR\chrome.zip" -DestinationPath $DEST_DIR
          
          # Download and Unzip ChromeDriver
          Invoke-WebRequest -Uri $DRIVER_URL -OutFile "$DEST_DIR\driver.zip"
          Expand-Archive -Path "$DEST_DIR\driver.zip" -DestinationPath $DEST_DIR

          # Cleanup zip files
          Remove-Item "$DEST_DIR\chrome.zip"
          Remove-Item "$DEST_DIR\driver.zip"

      # Step 6: Add Chrome binaries to PATH
      # Ensures Python can find 'chrome.exe' and 'chromedriver.exe'
      - name: Add binaries to PATH
        shell: powershell
        run: |
          echo "C:\selenium_bin\chrome-win64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\selenium_bin\chromedriver-win64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Step 7: Verify Chrome installation
      - name: Verify browser setup
        run: |
          echo "Verifying installation..."
          chrome --version
          chromedriver --version

      # Step 8: Cache PHP
      - name: Cache PHP
        uses: actions/cache@v4
        with:
          path: C:\tools\php
          key: php-8.1-${{ runner.os }}

      # Step 9: Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: "8.1"
            extensions: none
            ini-values: error_reporting=E_ALL
            coverage: none

      # Step 10: Start the web application
      - name: Start web server
        shell: powershell
        run: |
          cd "web application"
          Start-Process php -ArgumentList "-S", "localhost:8000" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          curl.exe -I http://localhost:8000/index.php
          Start-Sleep -Seconds 2
        env:
          BASE_URL: http://localhost:8000/index.php

      # Step 11: Execute Selenium test script
      - name: Run Selenium tests
        run: |
          cd tests
          python test_order_GitHub_Actions.py
        env:
          BASE_URL: http://localhost:8000/index.php
          PYTHONIOENCODING: utf-8

      # Step 12: Upload Artifacts
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-windows
          path: tests/test_report.html
          retention-days: 30
          if-no-files-found: warn
          
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-windows
          path: tests/test_screenshots/
          retention-days: 30
          if-no-files-found: ignore
