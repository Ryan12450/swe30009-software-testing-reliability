# GitHub Actions Workflow for Selenium Testing on Windows
# This workflow automates the execution of Selenium tests in a CI/CD pipeline

name: Selenium Tests (Windows)

# Configure the workflow to run manually
# This allows triggering the workflow on-demand from the Actions tab
on:
  workflow_dispatch:

# Set a global timeout of 30 minutes to prevent stalled jobs from consuming resources
# This will automatically terminate the job if it exceeds this time limit
jobs:
  test:
    # Specify the runner environment - using the latest Windows image
    runs-on: windows-latest

    # Set job-level timeout to 30 minutes
    timeout-minutes: 30

    steps:
      # Step 1: Check out the repository code
      # This clones the repository so the workflow can access the files
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      # Configure Python 3.x to run the test scripts
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install project dependencies
      # Install all required Python packages from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Set up Chrome browser and ChromeDriver
      # Ensure the browser and WebDriver are available for Selenium tests
      - name: Set up Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      # Step 5: Check if Chrome is installed correctly
      # Display Chrome version to confirm it's working
      - name: Verify browser setup
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          & "C:\Program Files\Google\Chrome\Application\chrome.exe" --version

      # Step 6: Install PHP
      # Configure PHP to serve the web application
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: "8.1"
            extensions: none
            ini-values: error_reporting=E_ALL
            coverage: none

      # Step 7: Start the web application
      # Launch PHP built-in server to serve the application on localhost port 8000
      - name: Start web server
        run: |
          cd "web application"
          Start-Process php -ArgumentList "-S", "localhost:8000" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          curl.exe -I http://localhost:8000/index.php
          Start-Sleep -Seconds 2
        shell: powershell
        env:
          BASE_URL: http://localhost:8000/index.php

      # Step 8: Execute Selenium test script
      # Run the Python test script which reads test cases from CSV,
      # launches the browser, loads the web application, and collects results
      - name: Run Selenium tests
        run: |
          cd tests
          python test_order_GitHub_Actions.py
        env:
          BASE_URL: http://localhost:8000/index.php
          PYTHONIOENCODING: utf-8

      # Step 9A: Upload the HTML Test Report
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-windows
          path: tests/test_report.html
          retention-days: 30
          if-no-files-found: warn
          
      # Step 9B: Save screenshots and error logs as artifacts for debugging and review
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-windows
          path: tests/test_screenshots/
          retention-days: 30
          if-no-files-found: ignore
