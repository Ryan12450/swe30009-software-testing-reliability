# GitHub Actions Workflow for Selenium Testing on Windows
name: Selenium Tests (Windows)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python with cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Get latest Chrome version
        id: chrome-version
        shell: powershell
        run: |
          $response = Invoke-RestMethod -Uri "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
          $version = $response.channels. Stable.version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Latest stable Chrome version: $version"
      - name: Cache Chrome and ChromeDriver
        uses: actions/cache@v4
        id: chrome-cache
        with:
          path: |
            C:\chrome
            C:\chromedriver
          key: chrome-${{ steps.chrome-version.outputs.version }}-windows
      - name: Install Chrome for Testing
        if: steps.chrome-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $CHROME_VERSION = "${{ steps.chrome-version.outputs.version }}"
          Write-Host "Downloading Chrome for Testing $CHROME_VERSION..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64/chrome-win64.zip" -OutFile "chrome-win64.zip"
          Expand-Archive -Path "chrome-win64.zip" -DestinationPath "C:\" -Force
          Rename-Item -Path "C:\chrome-win64" -NewName "chrome" -Force
          Invoke-WebRequest -Uri "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64/chromedriver-win64.zip" -OutFile "chromedriver-win64.zip"
          Expand-Archive -Path "chromedriver-win64. zip" -DestinationPath "C:\" -Force
          Rename-Item -Path "C:\chromedriver-win64" -NewName "chromedriver" -Force
          echo "C:\chrome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\chromedriver" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Remove-Item "chrome-win64. zip" -Force
          Remove-Item "chromedriver-win64.zip" -Force
          Write-Host "Installation complete"
      - name: Verify browser setup
        shell: powershell
        run: |
          Write-Host "Verifying installation..."
          & "C:\chrome\chrome.exe" --version
          & "C:\chromedriver\chromedriver.exe" --version
      - name: Cache PHP
        uses: actions/cache@v4
        with:
          path: C:\tools\php
          key: php-8.1-${{ runner.os }}
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: none
          ini-values: error_reporting=E_ALL
          coverage: none
      - name: Start web server
        shell: powershell
        run: |
          cd "web application"
          Start-Process php -ArgumentList "-S", "localhost:8000" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          curl. exe -I http://localhost:8000/index.php
          Start-Sleep -Seconds 2
        env:
          BASE_URL: http://localhost:8000/index.php
      - name: Run Selenium tests
        run: |
          cd tests
          python test_order_GitHub_Actions.py
        env:
          BASE_URL: http://localhost:8000/index.php
          PYTHONIOENCODING: utf-8
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-windows
          path: tests/test_report.html
          retention-days: 30
          if-no-files-found: warn
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-windows
          path: tests/test_screenshots/
          retention-days: 30
          if-no-files-found: ignore
