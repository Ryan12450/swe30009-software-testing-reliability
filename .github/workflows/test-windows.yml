# GitHub Actions Workflow for Selenium Testing on Windows
# This workflow automates the execution of Selenium tests in a CI/CD pipeline

name: Selenium Tests (Windows)

# Configure the workflow to run manually
on:
  workflow_dispatch:

# Set a global timeout of 30 minutes
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment with built-in caching
      # Updated to v6 to match optimized caching standards
      - name: Set up Python with cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 8: Cache PHP
      - name: Cache PHP
        uses: actions/cache@v4
        with:
          path: C:\tools\php
          key: php-8.1-${{ runner.os }}

      # Step 9: Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: none
          ini-values: error_reporting=E_ALL
          coverage: none

      # Step 10: Start the web application
      - name: Start web server
        shell: powershell
        run: |
          cd "web application"
          Start-Process php -ArgumentList "-S", "localhost:8000" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          curl.exe -I http://localhost:8000/index.php
          Start-Sleep -Seconds 2
        env:
          BASE_URL: http://localhost:8000/index.php

      # Step 11: Execute Selenium test script
      - name: Run Selenium tests
        run: |
          cd tests
          python test_order_GitHub_Actions.py
        env:
          BASE_URL: http://localhost:8000/index.php
          PYTHONIOENCODING: utf-8

      # Step 12: Upload Artifacts
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-windows
          path: tests/test_report.html
          retention-days: 30
          if-no-files-found: warn
          
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-windows
          path: tests/test_screenshots/
          retention-days: 30
          if-no-files-found: ignore
